name: grand_frere_intelligent
description: Application de préparation aux concours de la fonction publique burkinabè avec IA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation et état
  provider: ^6.1.2
  go_router: ^13.2.0

  # HTTP et stockage
  http: ^1.2.0
  dio: ^5.4.3
  shared_preferences: ^2.2.3

  # UI et design
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Médias
  image_picker: ^1.0.7
  speech_to_text: ^7.0.0
  audioplayers: ^6.1.0
  file_picker: ^8.0.3

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.4

  # WebView (paiement Senfenico)
  webview_flutter: ^4.7.0

  # Utilitaires
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.0
  url_launcher: ^6.2.7
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.1.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Les polices sont gérées via le package google_fonts (pas de fichiers locaux nécessaires)
